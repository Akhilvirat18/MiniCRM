# Spring Boot Application Properties
spring.application.name=minicrm
server.port=8080

# Database Mode: in-memory (default, zero setup) OR mongodb
crm.database.mode=mongodb

# Standard MongoDB Configuration (Active only if crm.database.mode=mongodb)
spring.data.mongodb.uri=mongodb://localhost:27017/minicrm

# Loopback HTTP Webhook URL for Simulated Deliveries
crm.callback.url=${CALLBACK_URL:http://localhost:8080/api/callbacks/delivery}

# AI Integration: Gemini API Key
# ⚠️  LOCAL DEV ONLY — DO NOT COMMIT THIS KEY TO GITHUB
# Before pushing, remove the key and use: gemini.api.key=${GEMINI_API_KEY:}
gemini.api.key=${GEMINI_API_KEY}

# Frontend Origin for CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# -----------------------------------------------------------------------
# Stub Channel Service — Simulated Delivery Event Rates
#
# These probabilities mirror realistic channel benchmarks and can be tuned
# per environment to simulate different channel characteristics.
# e.g. WhatsApp has higher read rates; email has lower open rates.
#
# At production scale, each channel (SMS, Email, WhatsApp, RCS) would have
# its own stubbed worker with its own rate profile.
# -----------------------------------------------------------------------
stub.delivery-rate=0.98
stub.read-rate=0.75
stub.open-rate=0.65
stub.click-rate=0.40
stub.convert-rate=0.25
stub.failure-rate=0.02

# -----------------------------------------------------------------------
# Stub Callback Retry Policy
# MAX retries on loopback HTTP callback before falling back to direct DB write
# -----------------------------------------------------------------------
stub.callback.max-retries=3
stub.callback.retry-base-delay-ms=100

# JSON Settings
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Spring Logging Configuration
logging.level.com.minicrm=INFO
logging.level.org.springframework.web=INFO
server.error.include-stacktrace=never
